<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信公众号富文本复制工具</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 30px;
      width: 100%;
      max-width: 800px;
    }
    h1 { margin: 0 0 8px 0; font-size: 24px; color: #1a1a2e; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
    textarea {
      width: 100%;
      height: 350px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      resize: vertical;
      transition: border-color 0.3s;
    }
    textarea:focus { outline: none; border-color: #667eea; }
    textarea::placeholder { color: #aaa; }
    .options {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
      color: #333;
    }
    .option-item input { width: 18px; height: 18px; cursor: pointer; }
    .btn-group { display: flex; gap: 12px; margin-top: 16px; }
    button {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-secondary { background: #f5f5f5; color: #333; }
    .btn-secondary:hover { background: #e8e8e8; }
    .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%) !important; }
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .status.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .tips {
      margin-top: 20px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 10px;
      font-size: 13px;
      color: #666;
    }
    .tips strong { color: #333; }
    .tips ol { margin: 8px 0 0 0; padding-left: 20px; }
    .tips li { margin: 4px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 微信公众号富文本复制工具</h1>
    <p class="subtitle">粘贴HTML代码，一键复制为富文本，直接粘贴到公众号后台</p>
    
    <textarea id="htmlBox" placeholder="在这里粘贴微信公众号兼容的HTML代码..."></textarea>
    
    <div class="options">
      <label class="option-item">
        <input type="checkbox" id="compactMode" checked>
        <span>📐 紧凑模式（减小段落间距）</span>
      </label>
      <label class="option-item">
        <input type="checkbox" id="removeMargin">
        <span>🔥 极简模式（移除所有间距）</span>
      </label>
    </div>
    
    <div class="btn-group">
      <button class="btn-primary" id="copyBtn" onclick="copyRich()">📋 复制富文本</button>
      <button class="btn-secondary" onclick="clearBox()">🗑️ 清空</button>
      <button class="btn-secondary" onclick="previewHtml()">👁️ 预览</button>
    </div>
    
    <div id="status" class="status"></div>
    
    <div class="tips">
      <strong>💡 使用说明：</strong>
      <ol>
        <li>将生成的微信公众号HTML代码粘贴到上方文本框</li>
        <li>选择间距模式：<strong>紧凑模式</strong>适合大多数情况，<strong>极简模式</strong>完全无间距</li>
        <li>点击「复制富文本」按钮</li>
        <li>前往微信公众号后台编辑器，直接 Ctrl+V / Cmd+V 粘贴</li>
      </ol>
    </div>
  </div>

  <!-- 预览弹窗 -->
  <div id="previewModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;overflow:auto;">
    <div style="background:white;margin:40px auto;max-width:600px;border-radius:12px;position:relative;">
      <div style="padding:16px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;">
        <strong>预览效果</strong>
        <button onclick="closePreview()" style="background:none;border:none;font-size:24px;cursor:pointer;">&times;</button>
      </div>
      <div id="previewContent" style="padding:20px;max-height:70vh;overflow:auto;"></div>
    </div>
  </div>

  <script>
    // 压缩HTML空白
    function compressHtml(html) {
      return html
        .replace(/<!--[\s\S]*?-->/g, '')
        .replace(/>\s+</g, '><')
        .replace(/>\s+/g, '>')
        .replace(/\s+</g, '<')
        .replace(/\s{2,}/g, ' ')
        .trim();
    }

    // 紧凑模式：缩小margin值
    function compactMargin(html) {
      return html
        // margin:2em 0 → margin:0.5em 0
        .replace(/margin\s*:\s*2em\s+0/gi, 'margin:0.5em 0')
        // margin:1.5em 0 → margin:0.3em 0
        .replace(/margin\s*:\s*1\.5em\s+0/gi, 'margin:0.3em 0')
        // margin:1.2em 0 → margin:0.2em 0
        .replace(/margin\s*:\s*1\.2em\s+0/gi, 'margin:0.2em 0')
        // margin:1em 0 → margin:0.2em 0
        .replace(/margin\s*:\s*1em\s+0/gi, 'margin:0.2em 0')
        // 其他带em的margin也缩小
        .replace(/margin\s*:\s*(\d+(?:\.\d+)?)em/gi, (match, num) => {
          const newVal = Math.max(0.1, parseFloat(num) * 0.3).toFixed(1);
          return `margin:${newVal}em`;
        });
    }

    // 极简模式：移除所有margin
    function removeAllMargin(html) {
      return html
        .replace(/margin\s*:\s*[^;}"']+/gi, 'margin:0')
        .replace(/margin-top\s*:\s*[^;}"']+/gi, 'margin-top:0')
        .replace(/margin-bottom\s*:\s*[^;}"']+/gi, 'margin-bottom:0');
    }

    async function copyRich() {
      const rawHtml = document.getElementById('htmlBox').value.trim();
      const compactMode = document.getElementById('compactMode').checked;
      const removeMargin = document.getElementById('removeMargin').checked;
      const copyBtn = document.getElementById('copyBtn');
      
      if (!rawHtml) {
        showStatus('请先粘贴HTML代码', 'error');
        return;
      }

      // 处理HTML
      let html = compressHtml(rawHtml);
      
      if (removeMargin) {
        html = removeAllMargin(html);
      } else if (compactMode) {
        html = compactMargin(html);
      }

      try {
        const htmlBlob = new Blob([html], { type: 'text/html' });
        const textBlob = new Blob([html], { type: 'text/plain' });
        
        await navigator.clipboard.write([new ClipboardItem({
          'text/html': htmlBlob,
          'text/plain': textBlob
        })]);
        
        copyBtn.textContent = '✅ 复制成功！';
        copyBtn.classList.add('btn-success');
        showStatus('富文本已复制到剪贴板，现在可以直接粘贴到微信公众号后台', 'success');
        
        setTimeout(() => {
          copyBtn.textContent = '📋 复制富文本';
          copyBtn.classList.remove('btn-success');
        }, 2000);
        
      } catch (err) {
        console.error('复制失败:', err);
        showStatus('复制失败：' + (err.message || '请检查浏览器是否支持剪贴板API'), 'error');
      }
    }

    function showStatus(message, type) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;
      statusEl.className = 'status ' + type;
      if (type === 'success') {
        setTimeout(() => { statusEl.style.display = 'none'; }, 5000);
      }
    }

    function clearBox() {
      document.getElementById('htmlBox').value = '';
      document.getElementById('status').style.display = 'none';
    }

    function previewHtml() {
      const rawHtml = document.getElementById('htmlBox').value.trim();
      const compactMode = document.getElementById('compactMode').checked;
      const removeMargin = document.getElementById('removeMargin').checked;
      
      if (!rawHtml) {
        showStatus('请先粘贴HTML代码', 'error');
        return;
      }
      
      let html = rawHtml;
      if (removeMargin) {
        html = removeAllMargin(html);
      } else if (compactMode) {
        html = compactMargin(html);
      }
      
      document.getElementById('previewContent').innerHTML = html;
      document.getElementById('previewModal').style.display = 'block';
    }

    function closePreview() {
      document.getElementById('previewModal').style.display = 'none';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closePreview();
    });

    // 互斥选项
    document.getElementById('removeMargin').addEventListener('change', function() {
      if (this.checked) {
        document.getElementById('compactMode').checked = false;
      }
    });
    document.getElementById('compactMode').addEventListener('change', function() {
      if (this.checked) {
        document.getElementById('removeMargin').checked = false;
      }
    });
  </script>
</body>
</html>
